# pdf.xendinglobal.com — fx-pdf-generator on port 3001
server {
        listen 443 ssl;
        listen [::]:443 ssl ipv6only=on;
        server_name pdf.xendinglobal.com;

        ssl_certificate /etc/letsencrypt/live/pdf.xendinglobal.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/pdf.xendinglobal.com/privkey.pem; # managed by Certbot
        include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

        client_max_body_size 20M;

        location / {
                proxy_pass http://127.0.0.1:3001;
                proxy_http_version 1.1;
                proxy_cache_bypass $http_upgrade;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 120s;
                proxy_send_timeout 120s;
        }
}