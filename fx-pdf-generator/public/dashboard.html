<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xending Dashboard - FX Reports</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #0f172a;
            --accent: #008b8b;
            --glass: rgba(255, 255, 255, 0.95);
            --bg: #f8fafc;
            --text-main: #334155;
            --text-light: #64748b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--primary);
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 40px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .subtitle {
            color: var(--text-light);
            margin-top: 5px;
        }

        /* Report Table Card */
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
        }

        .card-header {
            padding: 24px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 6px;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: #f1f5f9;
            color: var(--primary);
            transform: translateY(-1px);
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px 24px;
            color: var(--text-light);
            font-weight: 500;
            font-size: 14px;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 15px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #f8fafc;
        }

        .file-icon {
            color: #dc2626;
            margin-right: 12px;
            font-size: 18px;
        }

        .meta-text {
            font-size: 13px;
            color: var(--text-light);
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-view {
            background: #e0f2fe;
            color: #0284c7;
            margin-right: 8px;
        }

        .btn-view:hover {
            background: #bae6fd;
        }

        .btn-download {
            background: #f1f5f9;
            color: var(--text-main);
        }

        .btn-download:hover {
            background: #e2e8f0;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: #dcfce7;
            color: #166534;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
            font-style: italic;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="#" class="brand">
            <div class="brand-icon">XG</div>
            Xending
        </a>

        <div class="nav-menu">
            <div class="nav-item">
                <i class="fa-solid fa-home"></i> Home
            </div>
            <div class="nav-item active">
                <i class="fa-solid fa-file-invoice-dollar"></i> Daily Reports
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-newspaper"></i> Market News
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-chart-line"></i> Analytics
            </div>
        </div>
    </aside>

    <!-- Content -->
    <main class="main-content">
        <div class="header">
            <div class="title">Reportes FX Diarios</div>
            <div class="subtitle">Repositorio de análisis generados automáticamente (USD/MXN)</div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">Historial de Archivos</div>
                <button class="refresh-btn" onclick="fetchReports()">
                    <i class="fa-solid fa-rotate-right"></i> Actualizar
                </button>
            </div>

            <div id="table-container">
                <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Cargando reportes...</div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', fetchReports);

        async function fetchReports() {
            const container = document.getElementById('table-container');

            try {
                const response = await fetch('/api/daily-reports');
                const data = await response.json();

                if (!data.reports || data.reports.length === 0) {
                    container.innerHTML = '<div class="empty-state">No hay reportes generados aún. Ejecuta el bot para crear uno.</div>';
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre del Archivo</th>
                                <th>Fecha Generación</th>
                                <th>Tamaño</th>
                                <th>Estado</th>
                                <th style="text-align: right;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.reports.forEach(report => {
                    const dateObj = new Date(report.date);
                    const dateStr = dateObj.toLocaleDateString('es-MX', {
                        day: '2-digit', month: 'short', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });

                    html += `
                        <tr>
                            <td>
                                <i class="fa-solid fa-file-pdf file-icon"></i>
                                <strong>${report.filename}</strong>
                            </td>
                            <td class="meta-text">${dateStr}</td>
                            <td class="meta-text">${report.size}</td>
                            <td><span class="status-badge">Completado</span></td>
                            <td style="text-align: right;">
                                <a href="${report.url}" target="_blank" class="btn-action btn-view">
                                    <i class="fa-solid fa-eye"></i> Ver
                                </a>
                                <a href="${report.url}" download class="btn-action btn-download">
                                    <i class="fa-solid fa-download"></i>
                                </a>
                            </td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                container.innerHTML = html;

            } catch (error) {
                console.error("Error:", error);
                container.innerHTML = '<div class="empty-state" style="color: #ef4444;">Error al cargar reportes. Verifica que el servidor (server.js) esté corriendo.</div>';
            }
        }
    </script>
</body>

</html>
