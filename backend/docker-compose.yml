# Xending Backend — Development Docker Compose
# Replaces the Supabase Docker Compose with FastAPI + PostgreSQL + Redis

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: xending-db
    ports:
      - "55432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - xending-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis (Celery broker) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xending-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ─── FastAPI Backend ──────────────────────────────────────────────
  api:
    build: .
    container_name: xending-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/postgres
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      APP_ENV: development
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ─── Celery Worker ────────────────────────────────────────────────
  worker:
    build: .
    container_name: xending-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.tasks worker --loglevel=info
    restart: unless-stopped

volumes:
  xending-db-data:
