        CashFlowInsight:
            description: Taxpayer cash flow
            content:
                application/ld+json:
                    schema:
                        type: object
                        properties:
                            data:
                                description: Cash flow data grouped by period
                                type: array
                                items:
                                    type: object
                                    properties:
                                        type:
                                            description: Used to identify the flow
                                            enum:
                                                - inflow
                                                - outflow
                                            type: string
                                            example: inflow
                                        dateLabel:
                                            description: Human-readable label for the period. Format varies by periodicity.
                                            type: string
                                            example: 2016/Aug
                                        date:
                                            description: Date key for the period. Format varies by periodicity.
                                            type: string
                                            example: "202408"
                                        startDate:
                                            description: The start date of the period in `YYYY-MM-DD` format.
                                            type: string
                                            format: date
                                            example: "2024-08-01"
                                        transactions:
                                            description: Number of invoices processed to get this record
                                            type: integer
                                            example: 6
                                        amount:
                                            description: Total amount in the original currency
                                            type: number
                                            example: 5938.88
                                        mxnAmount:
                                            description: Amount converted to `MXN` using the exchange rate at the time the invoice was issued.
                                            type: number
                                            example: 114638.76
                                        metric:
                                            description: Signed MXN amount. Positive for inflows, negative for outflows.
                                            type: number
                                            example: 114638.76
                                        groupName:
                                            description: The dimension value for the selected `type` grouping (e.g. currency code, payment method, or `total`).
                                            type: string
                                            example: total
                            stats:
                                description: Data quality statistics per period, indicating how many invoices had the required fields for accurate calculation.
                                type: array
                                items:
                                    type: object
                                    properties:
                                        total:
                                            description: Total number of invoices in this period
                                            type: integer
                                            example: 50
                                        hits:
                                            description: Number of invoices with sufficient data for accurate calculation
                                            type: integer
                                            example: 48
                                        date:
                                            description: Date key for the period
                                            type: string
                                            example: "202408"
                                        dateLabel:
                                            description: Human-readable label for the period
                                            type: string
                                            example: 2016/Aug
                                        startDate:
                                            description: The start date of the period in `YYYY-MM-DD` format
                                            type: string
                                            format: date
                                            example: "2024-08-01"
        RpcShareholdersInsight:
            description: RPC Shareholders
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            data:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        name:
                                            description: Name
                                            type: string
                                            example: FOO BAR, S.A. DE C.V.
                                        rfc:
                                            description: RFC
                                            type: string
                                            example: PEIC211118IS0
                                        shares:
                                            description: Number of shares
                                            type: number
                                            example: 12345
                                        percentage:
                                            description: Shares percentage
                                            type: number
                                            format: float
                                            example: 100
