        get:
            tags:
                - DS MX SAT Credentials
            operationId: ListCredential
            summary: List all credentials
            responses:
                "200":
                    $ref: "#/components/responses/CredentialCollection"
                "401":
                    $ref: "#/components/responses/Unauthorized"
            parameters:
                - name: type
                  in: query
                  description: Filter by type (exact match)
                  schema:
                      $ref: "#/components/schemas/CredentialType"
                - name: rfc
                  in: query
                  description: Filter by taxpayer ID (partial match)
                  schema:
                      $ref: "#/components/schemas/TaxpayerID"
                - name: status
                  in: query
                  description: Filter by status (exact match)
                  schema:
                      $ref: "#/components/schemas/CredentialStatus"
                - name: deactivatedAt[before]
                  in: query
                  description: Filter by deactivation date (less than or equal `<=`)
                  example: "2020-01-17 11:47:27"
                  schema:
                      type: string
                      format: date-time
                - name: deactivatedAt[strictly_before]
                  in: query
                  description: Filter by deactivation date (less than `<`)
                  example: "2020-01-17 11:47:27"
                  schema:
                      type: string
                      format: date-time
                - name: deactivatedAt[after]
                  in: query
                  description: Filter by deactivation date (greater than or equal `>=`)
                  example: "2020-01-17 11:47:27"
                  schema:
                      type: string
                      format: date-time
                - name: deactivatedAt[strictly_after]
                  in: query
                  description: Filter by deactivation date (greater than `>`)
                  example: "2020-01-17 11:47:27"
                  schema:
                      type: string
                      format: date-time
                - $ref: "#/components/parameters/createdAtBefore"
                - $ref: "#/components/parameters/createdAtStrictlyBefore"
                - $ref: "#/components/parameters/createdAtAfter"
                - $ref: "#/components/parameters/createdAtStrictlyAfter"
                - $ref: "#/components/parameters/orderCreatedAt"
                - $ref: "#/components/parameters/collectionPage"
                - $ref: "#/components/parameters/collectionLimit"
