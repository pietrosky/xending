                - DS MX SAT Credentials
            operationId: CreateCredential
            summary: Create a credential
            description: "Creating a SAT credential will register the taxpayer in your account if it does not already exist."
            requestBody:
                $ref: "#/components/requestBodies/CredentialCreate"
            responses:
                "202":
                    $ref: "#/components/responses/Credential"
                "400":
                    $ref: "#/components/responses/ConstraintViolation"
                "401":
