            tags:
                - Sales Revenue Insight
            operationId: GetSalesRevenueInsight
            summary: Get sales revenue
            description: |
                Returns sales revenue
            parameters:
                - $ref: "#/components/parameters/entityId"
                - name: options[from]
                  in: query
                  description: Filter by invoice issuing date (greater than)
                  schema:
                      type: string
                      format: date-time
                - name: options[to]
                  in: query
                  description: Filter by invoice issuing date (less than)
                  schema:
                      type: string
                      format: date-time
                - name: options[periodicity]
                  in: query
                  description: The data set is grouped by this field
                  schema:
                      enum:
                          - daily
                          - weekly
                          - monthly
                          - quarterly
                          - yearly
                      type: string
                      default: monthly
