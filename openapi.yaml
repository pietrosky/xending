                    type: object
                    description: Resource data (data.object) and changes (data.changes)
                    example:
                        object:
                            id: 91106968-1abd-4d64-85c1-4e73d96fb997
                            rfc: PEIC211118IS0
                            type: ciec
                            status: valid
                            createdAt: "2020-01-17 11:47:27"
                        changes:
                            status:
                                old: pending
                                new: valid
                createdAt:
                    $ref: "#/components/schemas/createdAt"
                updatedAt:
                    $ref: "#/components/schemas/updatedAt"
        EventCollection:
            allOf:
                - $ref: "#/components/schemas/CursorCollection"
                - type: object
                  properties:
                      "@context":
                          default: /contexts/Event
                      "@id":
                          default: /events
                      "hydra:member":
                          items:
                              $ref: "#/components/schemas/Event"
        ExtractionExtractor:
            type: string
            description: The extractor to be executed. Extracts various resources from the corresponding datasources.
            enum:
                - invoice
                - monthly_tax_return
                - annual_tax_return
                - rif_tax_return
                - tax_status
                - tax_retention
                - tax_compliance
                - electronic_accounting
                - rpc
                - buro_de_credito_report
                - bil
                - rug
        ExtractionStatus:
            type: string
            enum:
                - pending
                - running
                - finished
                - failed
                - stopping
                - stopped
        ExtractionOptions:
            type: object
            description: The extractor options. Check the available options for each extractor in [Extractions](https://docs.syntage.com/api-reference/extractions/overview#extractors).
            example:
                types:
                    - I
                    - E
                    - P
                period:
                    from: "2020-01-01T00:00:00.000Z"
                    to: "2020-03-31T23:59:59.000Z"
        ExtractionRateLimitedAt:
            type: string
            format: date-time
            description: |
                This field returns a date when the taxpayer reached the max amount of downloaded CFDI files allowed by SAT in a range of 24hrs. You should retry this extraction 24hrs later. If your taxpayer has not reached the max amount this value should be `NULL`
            example: "2019-01-03T21:10:40.000Z"
        ExtractionErrorCode:
            type: string
            description: |
                [Extraction error code](#section/Extraction-error-codes)
            nullable: true
            example: null
            enum:
                - invalid_credentials
                - login_failed
                - unrecoverable
                - sat_unavailable
                - internal_error
                - undefined
        ExtractionCreatedDataPoints:
            type: integer
            description: |
                This is the number of created resources. For example, if 1 invoice was created with its XML and PDF file this value should be 3. And If you previously extracted all the resources and there are no more resources to create this value is 0.
            example: 3
        ExtractionUpdatedDataPoints:
            type: integer
            description: |
                When your taxpayer has resources by a previous extraction and new extraction found changes between our data and Sat data it would update this resource. For example, when a new extraction finds a Canceled invoice which you previously extracted as an Active invoice.
            example: 2
        Extraction:
            type: object
            properties:
                "@id":
                    type: string
                    format: iri-reference
                    description: Extraction IRI reference
                    example: /extractions/91106968-1abd-4d64-85c1-4e73d96fb997
                "@type":
                    type: string
                    default: Extraction
                id:
                    type: string
                    format: uuid
                    example: 91106968-1abd-4d64-85c1-4e73d96fb997
                taxpayer:
                    $ref: "#/components/schemas/Taxpayer"
                extractor:
                    $ref: "#/components/schemas/ExtractionExtractor"
                options:
                    $ref: "#/components/schemas/ExtractionOptions"
                status:
                    $ref: "#/components/schemas/ExtractionStatus"
                startedAt:
                    type: string
                    format: date-time
                    description: Time when the _status_ changed from **pending** to **running**
                    nullable: true
                finishedAt:
                    type: string
                    format: date-time
                    description: Time when the _status_ changed from **running** to **finished** or **failed**
                    nullable: true
                rateLimitedAt:
                    $ref: "#/components/schemas/ExtractionRateLimitedAt"
                errorCode:
                    $ref: "#/components/schemas/ExtractionErrorCode"
                createdDataPoints:
                    $ref: "#/components/schemas/ExtractionCreatedDataPoints"
                updatedDataPoints:
                    $ref: "#/components/schemas/ExtractionUpdatedDataPoints"
                createdAt:
                    $ref: "#/components/schemas/createdAt"
                updatedAt:
                    $ref: "#/components/schemas/updatedAt"
        ExtractionCollection:
            allOf:
                - $ref: "#/components/schemas/CursorCollection"
                - type: object
                  properties:
                      "@context":
                          default: /contexts/Extraction
                      "@id":
                          default: /extractions
                      "hydra:member":
                          items:
                              $ref: "#/components/schemas/Extraction"
