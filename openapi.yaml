                - $ref: "#/components/parameters/validFromAfter"
                - $ref: "#/components/parameters/validFromStrictlyAfter"
                - $ref: "#/components/parameters/validToBefore"
                - $ref: "#/components/parameters/validToStrictlyBefore"
                - $ref: "#/components/parameters/validToAfter"
                - $ref: "#/components/parameters/validToStrictlyAfter"
                - $ref: "#/components/parameters/orderValidFrom"
                - $ref: "#/components/parameters/orderValidTo"
