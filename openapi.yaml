                - name: taxpayer.registrationDate[strictly_before]
                  in: query
                  description: Filter by taxpayer registration date (less than `<`)
                  example: "2020-01-17 11:47:27"
                  schema:
                      type: string
                      format: date-time
                - name: taxpayer.registrationDate[after]
                  in: query
                  description: Filter by taxpayer registration date (greater than or equal `>=`)
                  example: "2020-01-17 11:47:27"
                  schema:
                      type: string
                      format: date-time
                - name: taxpayer.registrationDate[strictly_after]
                  in: query
                  description: Filter by taxpayer registration date (greater than `>`)
                  example: "2020-01-17 11:47:27"
                  schema:
                      type: string
                      format: date-time
                - $ref: "#/components/parameters/createdAtBefore"
                - $ref: "#/components/parameters/createdAtStrictlyBefore"
                - $ref: "#/components/parameters/createdAtAfter"
                - $ref: "#/components/parameters/createdAtStrictlyAfter"
                - $ref: "#/components/parameters/updatedAtBefore"
                - $ref: "#/components/parameters/updatedAtStrictlyBefore"
                - $ref: "#/components/parameters/updatedAtAfter"
                - $ref: "#/components/parameters/updatedAtStrictlyAfter"
                - $ref: "#/components/parameters/orderCreatedAt"
                - $ref: "#/components/parameters/orderUpdatedAt"
                - $ref: "#/components/parameters/collectionCursorNextPageParam"
                - $ref: "#/components/parameters/collectionCursorPreviousPageParam"
                - $ref: "#/components/parameters/collectionLimit"
            responses:
                "200":
                    $ref: "#/components/responses/EntityCollection"
                "401":
                    $ref: "#/components/responses/Unauthorized"
        post:
            tags:
                - Entities
            operationId: AddEntity
            summary: Add an Entity
            description: |
                Add an entity to your organization. Extractions are automatically created for each selected datasource.
                For SAT for example, one extraction is created for each extractor utilizing first time rules if any are set for that extractor.
                To prevent any extractions from being created, leave datasources empty.
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - name
                                - type
                            properties:
                                name:
                                    type: string
                                    writeOnly: true
                                    description: The name of the entity
                                    example: Syntage
                                rfc:
                                    type: string
                                    writeOnly: true
                                    description: The entity's RFC if known. If it is not input here, any extractions that require the RFC will be in waiting status until the Entity provides the RFC.
                                    example: XAXX010101000
                                type:
                                    type: string
                                    writeOnly: true
                                    description: The type of entity be it a company or person
                                    example: company
                                    enum:
                                        - company
                                        - person
                                datasources:
                                    type: array
                                    writeOnly: true
                                    description: The datasources that should be extracted for the new entity.
                                    example:
                                    items:
                                        type: object
                                        required:
                                            - name
                                        properties:
                                            name:
                                                $ref: "#/components/schemas/DatasourceName"
                                            options:
                                                type: object
                                                description: The options for the datasource. These mirror the options for extractions.
            responses:
                "201":
                    description: Add entity resource response
                    content:
                        application/ld+json:
                            schema:
                                type: object
                                required:
                                    - id
                                    - name
                                properties:
                                    "@context":
                                        type: string
                                        default: /contexts/EntityAddedResponse
                                    id:
                                        type: string
                                        example: "5c7c3ac7-5c49-49f4-be0a-7824bfcf3060"
                                    name:
                                        type: string
                                        example: Syntage
                                    rfc:
                                        type: string
                                        example: XAXX010101000
                                    "onboardingUrl":
                                        type: string
                                        example: https://registro.syntage.com/onboarding/018f3f8f-4538-7bbb-b432-9e97e34a564a
                                        description: The onboarding URL if adding the entity requires input from the entity
                "401":
                    $ref: "#/components/responses/Unauthorized"
