    - name: DS MX SAT Invoice Batch Payments
      description: |
          Batch Payments are mapped from payment receipts (type `P` invoices) and contain details of [Payments](#tag/Payments) made to deferred invoices. A Batch Payment bundles multiple [Payments](#tag/Payments) into one payment transaction. This means a single [Payment](#tag/Payments) can be reconciled with a single transaction on the bank statement.
    - name: DS MX SAT Invoice Payments
      description: |
          Payments are mapped from [Batch Payments](#tag/BatchPayments) of payment receipts (type `P` invoices). Payment receipts are issued by a taxpayer who receives a payment for a previously issued deferred invoice. A Payment belongs to a [Batch Payment](#tag/BatchPayments) and a deferred invoice (which the payment is applied), and the latter has its fields `paidAmount`, `dueAmount` and `fullyPaidAt` automatically updated based on the received payments.
    - name: DS MX SAT Electronic Accounting
    - name: DS MX SAT Tax Returns
    - name: DS MX SAT Tax Compliance Checks
      description: |
          A Tax Compliance Check maps the content of "Opinión de Cumplimiento de Obligaciones Fiscales", an official document issued by the SAT that states whether the taxpayer is complying with its tax obligations. Every Tax Compliance Check is a unique snapshot of the taxpayer compliance status at a given time (the check date).

          The result of a Tax Compliance Check can be:
          - **positive**: If the taxpayer is complying with all its tax obligations.
          - **negative**: If the taxpayer is not complying with all its tax obligations.
          - **no_obligations**: If the taxpayer does not have tax obligations.
          - **activity_suspended**: If the taxpayer is no longer in business.
