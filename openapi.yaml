    /shareholders/{shareholderId}/relations/{relationId}/promote:
        post:
            tags:
                - Shareholders
            operationId: PromoteShareholderRelation
            summary: Promote a shareholder relation
            description: |
                Promotes a shareholder relation by creating a new entity for the shareholder. This operation requires providing the shareholder's name, RFC, and datasource configuration.
            parameters:
                - $ref: "#/components/parameters/shareholderId"
                - $ref: "#/components/parameters/relationId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - name
                                - rfc
                            properties:
                                name:
                                    type: string
                                    description: The name of the shareholder to be promoted
                                    example: "JUAN MANUEL PEREZ GONZALEZ"
                                rfc:
                                    $ref: "#/components/schemas/TaxpayerID"
                                datasources:
                                    type: array
                                    description: Array of datasource configurations for the promoted shareholder
                                    items:
                                        type: object
                                        required:
                                            - name
                                        properties:
                                            name:
                                                type: string
                                                enum:
                                                    - sat
                                                    - buro_de_credito
                                                    - rpc
                                                    - rug
                                                    - bil
                                                description: The datasource name
                                                example: "sat"
                                        additionalProperties: true
                                    example:
                                        - name: "sat"
                                        - name: "rpc"
            responses:
                "200":
                    description: Shareholder Relation promoted successfully
                    content:
                        application/ld+json:
                            schema:
                                type: object
                                properties:
                                    "@type":
                                        type: string
                                        default: ShareholderPromotedResponse
                                    id:
                                        type: string
                                        format: uuid
                                        description: The UUID of the created entity
                                        example: "91ab5678-1234-5678-9abc-def012345678"
                                    name:
                                        type: string
                                        description: The name of the promoted shareholder
                                        example: "JUAN MANUEL PEREZ GONZALEZ"
                                    rfc:
                                        $ref: "#/components/schemas/TaxpayerID"
                                    onboardingUrl:
                                        type: string
                                        nullable: true
                                        description: Optional onboarding URL for the promoted entity
                                        example: "https://api.syntage.com/onboarding/91ab5678-1234-5678-9abc-def012345678"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
