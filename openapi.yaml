info:
    version: "2020-06-28"
    title: Syntage API
    contact:
        name: Email
        email: support@syntage.com
    description: |
        # Introduction

        The Syntage API is organized around [REST](https://en.wikipedia.org/wiki/Representational_State_Transfer).
        Our API has predictable resource-oriented URLs, accepts form-encoded request bodies, returns [JSON-LD](https://json-ld.org) responses, and uses standard HTTP response codes, authentication, and verbs.

        # Environments

        | Name | Description | Base URL |
        |------|-------------|----------|
        | **Sandbox** | The Sandbox environment is dedicated to development and testing. In this environment, no real taxpayer credentials are required and all interaction with the SAT is simulated generating life-like data, allowing you to pull test data from all endpoints. | https://api.sandbox.syntage.com |
        | **Production** | The Production environment is dedicated to live applications with real connections to the SAT. In this environment, real taxpayer credentials are required, and you will pull real fiscal data directly from the SAT. | https://api.syntage.com |

        Each environment has a different API Key for [authentication](#section/Authentication).

        # Request IDs

        Each API request has an associated request identifier.
        You can find this value in the response headers, under `X-Request-ID`:

        ```curl
        curl -i https://api.syntage.com
        HTTP/1.1 200 OK
        Date: Sun, 29 Nov 2020 19:21:21 GMT
        X-Request-ID: Root=1-6532dcae-169bf139354cd48959f55c55
        ```

        If you need to contact us about a specific request, providing the request identifier will ensure the fastest possible resolution.

        # Rate Limiting

        Our API employs a number of safeguards against bursts of incoming traffic to help maximize its stability.
        The returned HTTP headers of any API request show your current rate limit status:

        ```curl
        curl -i https://api.syntage.com
        HTTP/1.1 200 OK
        Date: Sun, 29 Nov 2020 19:21:21 GMT
        X-RateLimit-Limit: 60
        X-RateLimit-Remaining: 56
        X-RateLimit-Reset: 1606678044
        ```

        | Header Name           | Description |
        |-----------------------|------------------------------------------------------------------------------|
        | X-RateLimit-Limit     | The maximum number of requests you're permitted to make.                     |
        | X-RateLimit-Remaining | The number of requests remaining in the current rate limit window.           |
        | X-RateLimit-Reset     | The time at which the current rate limit window resets in UTC epoch seconds. |

        If you exceed the rate limit, a [429 Too Many Requests](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/429) response is returned:

        ```http
        HTTP/1.1 429 Too Many Requests
        Date: Sun, 29 Nov 2020 19:21:21 GMT
        X-RateLimit-Limit: 60
        X-RateLimit-Remaining: 0
        X-RateLimit-Reset: 1606678044
        ```

        We may reduce limits to prevent abuse, or increase limits to enable high-traffic operations.
        You can check your current limits in the [dashboard](https://app.syntage.com/settings/usage).
        To request an increased rate limit, please [contact support](https://support.syntage.com/).
        # Pagination
        When issuing a GET request on a collection containing more than 1 page (e.g. [/events](#operation/ListEvent)),  a collection is returned. Links to the first, the last, previous and the next page in the collection are displayed as well as the  number of total items in the collection.
        All endpoints that support this operation have a query parameter defined by:
          - `itemsPerPage` The number of items per page (default: 20, max: 1000)
          - `page` The collection page number

        ```bash
          "hydra:totalItems": 1,
          "hydra:view": {
            "@id": "/events?page=1",
            "@type": "hydra:PartialCollectionView",
            "hydra:first": "/events?page=1",
            "hydra:next": "/events?page=2",
            "hydra:last": "/events?page=3"
          },
        ```
        ## Cursor Pagination
        Cursor pagination is a technique used for navigating through large datasets efficiently. It allows you to retrieve a specific subset of results from a collection by using a cursor value that represents the position within the collection. The cursor serves as a reference point for fetching the next or previous set of results.
        ### Benefits of Cursor Pagination:
        1. **Efficient Navigation:** Cursor pagination eliminates the need to fetch the entire dataset at once, making it more scalable and faster. You can retrieve data in smaller, manageable chunks based on the cursor values.
        2. **Consistent Results:** Each page of results in cursor pagination is stable and doesn't change even if new items are added or removed from the collection. This ensures that you get consistent and reliable results.
        3. **Flexibility:** Cursors can be used to navigate forwards and backwards in the collection without impacting performance.

        ### How to Use Cursor Pagination:
        To use cursor pagination with our API, follow these instructions:
        1. Make a request to retrieve the initial page of results. The response will be a JSON-LD document that includes a `hydra:next` attribute with the URI for the next page. The URI already includes the cursor attribute.
        2. To retrieve the next page of results, make a GET request to the URI provided in the `hydra:next` attribute. This URI will automatically include the cursor value for the next page.
        3. If you want to navigate to the previous page, you can use the `hydra:previous` attribute in the JSON-LD response. It will contain the URI for the previous page, including the cursor value.
        4. You can continue making requests to the `hydra:next` and `hydra:previous` URIs to navigate through the paginated results, based on your requirements.
        Make sure to update your request headers to include the necessary headers for JSON-LD content negotiation, such as `Accept: application/ld+json` or `Content-Type: application/ld+json`.
        By following these instructions, you can effectively navigate through the paginated results using the cursor values provided in the `hydra:next` and `hydra:previous` attributes, without the need to manually include the cursor in your requests. This simplifies the pagination process and enhances the usability of our API.

        ### Considerations About Cursor Pagination:

          - By default, the API uses offset-based pagination (except for a few endpoints that we will list below). If you want to switch to cursor pagination, you need to include an additional header in your request. Set the `X-Pagination-Style` header with the value `"cursor"` to enable cursor pagination. If not specified, the API will assume offset-based pagination.

          - After enabling cursor pagination, the API response will no longer include the `hydra:totalItems` field by default. Retrieving the total count can be resource intensive and impact response times, especially for large datasets. However, if you need the `hydra:totalItems` information, you can include an additional header in your request. Set the `X-Pagination-Enable-Partial` header with the value `0` to indicate that the response should include extra information, including the `hydra:totalItems` count. Please be aware that enabling this feature may impact API response times, as the backend needs to perform a count operation on the dataset.

        If you require the `hydra:totalItems` count, please consider the potential impact on API response times.
        ### Example
        ```bash
          curl -i 'https://api.syntage.com/entities/{entityId}/invoices?itemsPerPage=10' \
            --header 'Accept: application/ld+json' \
            --header 'X-Api-Key: {apiKey}' \
            --header 'X-Pagination-Style: cursor' \
            --header 'X-Pagination-Enable-Partial: 0'
        ```
        **Note:** We only support cursor pagination for the following endpoints:
         - `GET /entities/{entityId}/invoices`
         - `GET /entities/{entityId}/invoices/line-items`
         - `GET /entities/{entityId}/invoices/{invoiceId}/line-items`
         - `GET /invoices/{invoiceId}/line-items`
         - `GET /entities/{entityId}/invoices/payments`

        Feel free to reach out if you have any further questions or need additional assistance!

        # Property Filtering
        The property filter adds the possibility to select the properties for GET operations.
        Syntax: `?properties[]=<property>&properties[<relation>][]=<property>`
        You can add as many properties as you need. The following example shows how to select `paymentType` and  `issuer.rfc` when fetching a list of invoices.
        ```curl
          curl -i https://api.syntage.com/entities/{entityId}/invoices?properties[]=paymentType&properties[issuer]=rfc
        ```
        # API Versioning Guide
        Guidance on changes between versions.
        ## Version: 2020-01-01 to 2020-06-28
        ### **Invoice**
        _**Affected Endpoints:** `GET /invoices/{id}` and `GET /entities/{entityId}/invoices`_
        - The `amount` property has been removed from API responses. Use the `total` property instead.
        - Retrieval by invoice's `uuid` at `/invoices/{id}` is now removed. To retrieve an invoice, use the invoice's `id` at the specified endpoint. To find an invoice using its `uuid`, filter the invoice collection at `/entities/{entityId}/invoices?uuid[]={uuid}`.
        - Previously, the `@iri` property for an invoice pointed to the resource using `uuid`, like `/invoices/{uuid}`. Now, it points using its `id`, like `/invoices/{id}`.

        ### **Entity (Formerly Link)**
        _**Affected Endpoint:** `GET /entities`_
        - Filtering entities by `status` is removed. Use `credential.status` instead. For example, utilize `GET /entities?credential.status[]=active` instead of `GET /entities?status[]=active`.

        ### **Tax Return**
        _**Affected Endpoints:** `GET /tax-returns/{id}` and `GET /entities/{entityId}/tax-returns`_
        - Retrieval by tax return's `operationNumber` at `/tax-returns/{id}` is removed. To retrieve a tax return, use the tax return's `id` at the mentioned endpoint. To find a tax return using its `operationNumber`, filter the collection at `/entities/{entityId}/tax-returns?operationNumber[]={operationNumber}`.
        - Previously, the `@iri` property for a tax return pointed to the resource using `operationNumber`, like `/tax-returns/{operationNumber}`. Now, it directs to its `id`, like `/tax-returns/{id}`.

        ### **Event**
        _**Affected Endpoints:** `GET /events` and `GET /events/{id}`_
        - For events associated to an `tax-return`, the `@iri` property now directs to `/tax-returns/{id}` instead of the previous `/tax-returns/{operationNumber}`.
        - For events associated to an `invoice`, the `@iri` property now directs to `/invoices/{id}` instead of the previous `/invoices/{uuid}`.

        ### **Extraction**
        _**Affected Endpoints:** `GET /extractions` and `GET /extractions/{id}`_
        - The `periodFrom` property has been removed. Use `options.period.from` instead.
        - The `periodTo` property has been removed. Use `options.period.to` instead.

        ### **File**
        _**Affected Endpoint:** `GET /file/{id}`_
        - For files associated to an `tax-return`, the `@iri` property now directs to `/tax-returns/{id}`, instead of the previous `/tax-returns/{operationNumber}`.
        - For files associated to an `invoice`, the `@iri` property now directs to `/invoices/{id}`, instead of the previous `/invoices/{uuid}`.

        ### Trying Out This Version
        If you want to test this version, you can do so by making any request with the `Accept-Version` header pointing to the latest version:
        ```curl
          curl -i 'https://api.syntage.com/entities/{entityId}/invoices' \
            --header 'Accept-Version: 2020-06-28' \
            --header 'X-Api-Key: {apiKey}'
        ```
tags:
    - name: Events
      description: |
          Events are our way of letting you know when something interesting happens in your account.
          When an interesting event occurs, we create a new Event resource.
          For example, when an entity's SAT credential is submitted, we create a `credential.created` event; and when a data extraction process finishes, we create an `extraction.updated` event.

          Note that many API requests may cause multiple events to be created. For example, if you submit a valid taxpayer credential, you will receive a `credential.created`, `credential.updated` and `link.created` event.

          Events occur when the state of another API resource changes. The state of that resource at the time of the change is embedded in the event's data field. For example, a `credential.updated` event will contain a Credential, and an `invoice.updated` event will contain an Invoice.

          As with other API resources, you can use endpoints to retrieve an individual event or a list of events from the API. We also have a separate webhooks system for sending the Event objects directly to an endpoint on your server. Webhooks are managed in your account settings.

          *NOTE: Access to events is only guaranteed for 7 days.*

          ### Types of events
          - **credential.created**: Occurs whenever a new taxpayer credential is submitted
          - **credential.updated**: Occurs whenever a credential status changes
          - **credential.deleted**: Occurs whenever a credential is deleted
          - **link.created**: Occurs whenever an entity with a taxpayer is created
          - **link.updated**: Occurs whenever an entity status changes
          - **link.deleted**: Occurs whenever an entity is deleted
          - **file.created**: Occurs whenever a file is created
          - **extraction.created**: Occurs whenever a data extraction request is created
          - **extraction.updated**: Occurs whenever an extraction status changes
          - **invoice.created**: Occurs whenever a new invoice is extracted from SAT
          - **invoice.updated**: Occurs whenever an existing invoice is updated
          - **invoice.deleted**: Occurs whenever an existing invoice is deleted
          - **invoice_payment.created**: Occurs whenever a new "invoice payment" is created from an invoice of type payment
          - **invoice_payment.updated**: Occurs whenever an existing "invoice payment" is updated
          - **invoice_line_item.created**: Occurs whenever a new "invoice line item" is created from an invoice
          - **invoice_line_item.updated**: Occurs whenever an existing "invoice line item" is updated
          - **tax_return.created**: Occurs whenever a new tax return is extracted from SAT
          - **tax_return.updated**: Occurs whenever an existing tax return is updated
          - **tax_return.deleted**: Occurs whenever an existing tax return is deleted
          - **export.created**: Occurs whenever the export endpoint is requested to generate a file
          - **export.updated**: Occurs whenever the export status changes. At the beginning it is `pending`, `running` while the file is creating and `finished` when the resource is ready
          - **tax_status.created**: Occurs whenever a tax status is extracted from SAT
          - **tax_status.updated**: Occurs whenever an existing tax status is updated
          - **tax_status.deleted**: Occurs whenever an existing tax status is deleted
          - **tax_compliance_check.created**: Occurs whenever a tax compliance check is extracted from SAT
          - **tax_compliance_check.updated**: Occurs whenever an existing tax compliance check is updated
          - **tax_compliance_check.deleted**: Occurs whenever an existing tax compliance check is deleted
          - **tax_retention.created**: Occurs whenever a tax retention is extracted from SAT
          - **tax_retention.updated**: Occurs whenever an existing tax retention is updated
          - **tax_retention.deleted**: Occurs whenever an existing tax retention is deleted
          - **electronic_accounting_record.created**: Occurs whenever a electronic accounting record is extracted from the SAT
          - **electronic_accounting_record.updated**: Occurs whenever an existing electronic accounting record is updated
          - **rpc_entidades.created**: Occurs whenever a new entidade is extracted from RPC
          - **rpc_entidades.updated**: Occurs whenever an existing entidade is updated
          - **rpc_socios.created**: Occurs whenever a new socio is extracted from RPC
          - **rpc_socios.updated**: Occurs whenever an existing socio is updated
          - **rpc_acto.created**: Occurs whenever a new acto is extracted from RPC
          - **rpc_acto.updated**: Occurs whenever an existing acto is updated
          - **rug_garantia.created**: Occurs whenever a new garantia is extracted from RUG
          - **rug_garantia.updated**: Occurs whenever an existing garantia is updated
          - **buro_de_credito_report.created**: Occurs whenever a new Buró de Crédito is created
          - **buro_de_credito_report.updated**: Occurs whenever a new Buró de Crédito is updated
          - **sat_certificate.created**: Occurs whenever a new SAT certificate is created
          - **sat_certificate.updated**: Occurs whenever an existing SAT certificate is updated
          - **background_check.created**: Occurs whenever a new background check is created
    - name: Exports
      description: |
          Export invoices data in csv or xlsx format. Once you requested an export you will receive an email with a link to download the generated file
    - name: Files
      description: |
          Files associated to resources
    - name: DS MX SAT Credentials
    - name: DS MX SAT Certificates
    - name: Entities
      description: |
          An Entity is a resource that represents a person or company. Entities can be added via Add Entity, or automatically when a credential is validated (when the status becomes "valid"). This resource controls your access to data and allows you to create new extractions. When an Entity is deleted, all data related to the entity is deleted as well.
    - name: Extractions
      description: |
          Extractions are tasks to retrieve data (e.g. invoices, tax returns, tax status, etc.) from various datasources such as the SAT, Buró de Crédito, etc.

          # Note
          Options containing a period (`.`) in the name like `period.from` are a way to denote object paths. For example, `period.from` should actually be sent as
          ```json
          {
              "options": {
                "period": {
                  "from": "2020-01-01",
                  "to": "2020-12-31"
                }
              }
          }
          ```

          # Extraction extractors

          The following **extractors** are currently available:

          ## invoice

          Extracts issued and received [Invoices](#tag/Invoices), including the CFDI files.

          You can customize the extraction by using the following options:

          | Option      | Description                               | Type   | Default Value         |
          |-------------|-------------------------------------------|--------|-----------------------|
          | types       | Filter by invoice type                    | array  | ['I','E','P','N','T'] |
          | period.from | Filter by issuing date (greater than)     | string | 2014-01-01            |
          | period.to   | Filter by issuing date (less than)        | string | now                   |
          | issued      | Include invoices issued by the taxpayer   | bool   | true                  |
          | received    | Include invoices received by the taxpayer | bool   | true                  |
          | xml         | Include the invoice CFDI XML file         | bool   | true                  |
          | pdf         | Include the invoice CFDI PDF file         | bool   | true                  |
          | complement  | Filter by complement                      | int    | -1                    |

          ## annual_tax_return

          Extracts annual [Tax Returns](#tag/TaxReturns), including the PDF files and payment data.

          You can customize the extraction by using the following options:

          | Option      | Description                               | Type   | Default Value |
          |-------------|-------------------------------------------|--------|---------------|
          | period.from | Filter by filing date (greater than)      | string | 2014-01-01    |
          | period.to   | Filter by filing date (less than)         | string | now           |

          ## monthly_tax_return

          Extracts provisional [Tax Returns](#tag/TaxReturns), including the PDF files and payment data.

          You can customize the extraction by using the following options:

          | Option      | Description                               | Type   | Default Value |
          |-------------|-------------------------------------------|--------|---------------|
          | period.from | Filter by filing date (greater than)      | string | 2014-01-01    |
          | period.to   | Filter by filing date (less than)         | string | now           |

          ## electronic_accounting

          Extracts trial balance and account catalogs.

          You can customize the extraction by using the following options:

          | Option      | Description                               | Type   | Default Value |
          |-------------|-------------------------------------------|--------|---------------|
          | period.from | Filter by filing date (greater than)      | string | 2014-01-01    |
          | period.to   | Filter by filing date (less than)         | string | now           |

          ## rif_tax_return

          Extracts Tax incorporation regime (RIF) [Tax Returns](#tag/TaxReturns) which only aplies for physical person, including the PDF files and payment data.

          You can customize the extraction by using the following options:

          | Option      | Description                               | Type   | Default Value |
          |-------------|-------------------------------------------|--------|---------------|
          | period.from | Filter by filing date (greater than)      | string | 2014-01-01    |
          | period.to   | Filter by filing date (less than)         | string | now           |

          ## tax_status

          Extracts the taxpayer [Tax Status](#tag/TaxStatus).

          No options available.

          ## tax_compliance

          Extracts the taxpayer [Tax Compliance Check](#tag/TaxComplianceChecks).

          No options available.

          ## rpc

          Extracts the RPC data.

          No options available.

          ## tax_retention

          Extracts issued and received [Tax Retention](#tag/TaxRetentions), including the CFDI files.

          You can customize the extraction by using the following options:

          | Option      | Description                               | Type   | Default Value |
          |-------------|-------------------------------------------|--------|---------------|
          | period.from | Filter by issuing date (greater than)     | string | 2014-01-01    |
          | period.to   | Filter by issuing date (less than)        | string | now           |
          | issued      | Include tax retentions issued by the taxpayer   | bool   | true          |
          | received    | Include tax retentions received by the taxpayer | bool   | true          |
          | xml         | Include the tax retention CFDI XML file         | bool   | true          |
          | pdf         | Include the tax retention CFDI PDF file         | bool   | true          |
          | complement  | Filter by complement                      | int    | -1            |

          ## buro_de_credito_report

          Extracts a report from Buró de Crédito including PDFs.

          You can customize the extraction by using the following options:

          | Option      | Description                               | Type   | Default Value |
          |-------------|-------------------------------------------|--------|---------------|
          | productType | The Buró de Crédito product type (e.g. INFORME_BURO, 007, RCO) | string | 007 (person / PDF), INFORME_BURO (company / PM)    |

          ## bil

          Extracts report from Buró de Investigaciones Legales.

          No options available.

          # Extraction status

          | Status | Description |
          | ------ | ----------- |
          | pending | The initial extraction status. The extraction is enqueued and waiting to be processed. |
          | waiting | The extraction does not meet the requirements to begin. |
          | running | The extraction process started and is currently running. The running time varies depending on the extractor type and the entity's transactional volume. You may find partial data available in our API endpoints during this time. |
          | finished | The extraction finished successfully. All data is available to be retrieved from our API endpoints. |
          | failed | The extraction couldn't start or failed during the process. Our internal retry policies weren't able to finish the extraction successfully. We may have partial data available in our API endpoints, but new extractions should be created to ensure all the entity's data is available. You can check the [extraction error code](#section/Extraction-error-codes) to understand why it failed and determine whether it can be retried or not. |
          | stopping | The extraction was requested to be stopped by the user. It is in the process of being stopped. |
          | stopped | The extraction was stopped by the user after it started running. This extraction is included in billing. |
          | cancelled | The extraction was stopped by the user before it started running. This extraction is not included in billing. |
          # Extraction error codes

          | Code | Description | Retryable |
          | ---- | ----------- | --------- |
          | invalid_credentials | The taxpayer [Credential](#tag/Credentials) is no longer valid. | No |
          | login_failed | We couldn't log in the taxpayer account. | Yes |
          | unrecoverable | The extraction process failed many times, and we reached a maximum number of retries. | Yes |
          | sat_unavailable | We detected that SAT itself is down or unresponsive. | Yes |
          | internal_error | We detected an internal error in our own infrastructure. | Yes |
          | undefined | We couldn't determine the error cause and our internal team will investigate it. | Yes |
    - name: DS MX SAT Invoices
      description: |
          ### Blacklist status

          The field `issuer.blacklistStatus` or `receiver.blacklistStatus` is set when the invoice issuer or receiver
          taxpayer is found in the [list 69-B](https://omawww.sat.gob.mx/cifras_sat/Paginas/datos/vinculo.html?page=ListCompleta69B.html) from SAT:

          | Status      | Description |
          |-------------|-----------------------------------------------------------------------------------------------------------|
          | presumed    | When the SAT identify some irregularities and start an investigation with the taxpayer                     |
          | dismissed   | After presumed status if the taxpayer shows evidence and the SAT decides that the taxpayer is innocent     |
          | definitive  | The SAT states that the taxpayer has irregularities and is guilty                                         |
          | favorable   | After definitive status the taxpayer shows more evidence and the SAT decides that the taxpayer is innocent |
