                exchangeRate:
                    $ref: "#/components/schemas/InvoiceBatchPaymentExchangeRate"
                amount:
                    $ref: "#/components/schemas/InvoiceBatchPaymentAmount"
                operationNumber:
                    $ref: "#/components/schemas/InvoiceBatchPaymentOperationNumber"
