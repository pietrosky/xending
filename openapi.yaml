        CreateExport:
            required: true
            content:
                application/json:
                    examples:
                        invoices:
                            summary: Invoice example
                            value:
                                format: xlsx
                                fileTypes:
                                    - invoice.cfdi.xml
                                uri: /entities/91106968-1abd-4d64-85c1-4e73d96fb997/invoices?usage=I01&type=I&issuedAt[after]=2020-01-01
                        tax_returns:
                            summary: Tax returns example
                            value:
                                format: csv
                                fileTypes:
                                    - tax_return.transcript
                                uri: /entities/{entityId}/tax-returns?itemsPerPage=20
                    schema:
                        type: object
                        required:
                            - format
                            - uri
                        properties:
                            format:
                                description: Format for your resource
                                type: string
                                enum:
                                    - csv
                                    - xlsx
                                    - json
                            fileTypes:
                                description: If a this field is specified it will return a ZIP file with the content files (Available just for Invoices) Use the prefixed values corresponding to the data that you want
                                type: array
                                minItems: 1
                                items:
                                    type: string
                                    enum:
                                        - invoice.cfdi.xml
                                        - invoice.cfdi.pdf
                                        - tax_return.transcript
                                        - tax_return.ack_receipt
                                        - tax_return.payment_receipt
                            uri:
                                description: |-
                                    Use any supported content type's collection endpoints and use its query parameters to filter
                                    ### Example of supported URI values
                                    - /entities
                                    - /entities/{entityId}/tax-returns
                                    - /entities/{entityId}/invoices
                                type: string
        CredentialCreate:
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            - $ref: "#/components/schemas/CredentialCiecInput"
                            - $ref: "#/components/schemas/CredentialEfirmaInput"
                        discriminator:
                            propertyName: type
                            mapping:
                                ciec: "#/components/schemas/CredentialCiecInput"
                                efirma: "#/components/schemas/CredentialEfirmaInput"
        ExtractionCreate:
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            - type: object
                              required:
                                  - entity
                                  - extractor
                              properties:
                                  entity:
                                      type: string
                                      format: iri-reference
                                      description: Entity IRI reference
                                      example: /entities/7b3a25a9-a53a-4846-abe6-f2574c9c2d5d
                                  extractor:
                                      $ref: "#/components/schemas/ExtractionExtractor"
                                  options:
                                      $ref: "#/components/schemas/ExtractionOptions"
                            - type: object
                              deprecated: true
                              required:
                                  - taxpayer
                                  - extractor
                              properties:
                                  taxpayer:
                                      type: string
                                      format: iri-reference
                                      description: Taxpayer IRI reference
                                      example: /taxpayers/PEIC211118IS0
                                  extractor:
                                      $ref: "#/components/schemas/ExtractionExtractor"
                                  options:
                                      $ref: "#/components/schemas/ExtractionOptions"
        WebhookEndpointCreate:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - url
                            - events
                            - enabled
                            - contentType
                        properties:
                            url:
                                $ref: "#/components/schemas/WebhookEndpointUrl"
                            events:
                                type: array
                                example:
                                    - credential.created
                                    - credential.updated
                                description: The list of events to enable for this endpoint.
                                items:
                                    $ref: "#/components/schemas/WebhookEndpointEventType"
                            enabled:
                                default: true
                                allOf:
                                    - $ref: "#/components/schemas/WebhookEndpointEnabled"
                            contentType:
                                default: application/ld+json
                                anyOf:
                                    - $ref: "#/components/schemas/WebhookEndpointContentType"
        WebhookEndpointUpdate:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        required:
                            - url
                            - events
                            - enabled
                            - contentType
                        properties:
                            url:
                                $ref: "#/components/schemas/WebhookEndpointUrl"
                            events:
                                type: array
                                example:
                                    - credential.created
                                    - credential.updated
                                description: The list of events to enable for this endpoint.
                                items:
                                    $ref: "#/components/schemas/WebhookEndpointEventType"
                            enabled:
                                default: true
                                allOf:
                                    - $ref: "#/components/schemas/WebhookEndpointEnabled"
                            contentType:
                                default: application/ld+json
                                anyOf:
                                    - $ref: "#/components/schemas/WebhookEndpointContentType"
security:
    - ApiKey: []
paths:
    /entities/{entityId}/datasources/mx/buro-de-credito/reports:
        get:
            tags:
                - DS MX Buró de Crédito Reports
            operationId: GetEntityMxBuroDeCreditoReports
            summary: Get an entity's Buró de Crédito reports
            parameters:
                - $ref: "#/components/parameters/entityId"
                - $ref: "#/components/parameters/collectionCursorNextPageParam"
                - $ref: "#/components/parameters/collectionCursorPreviousPageParam"
                - $ref: "#/components/parameters/collectionLimit"
            responses:
                "200":
                    description: Buró de Crédito Reports
                    content:
                        application/ld+json:
                            schema:
                                type: object
                                allOf:
                                    - $ref: "#/components/schemas/CursorCollection"
                                    - type: object
                                      properties:
                                          "@context":
                                              default: /contexts/BuroDeCreditoReport
                                          "@id":
                                              example: /entities/9bd4a640-9f41-4cd5-a158-20767b386ca0/datasources/mx/buro-de-credito/reports
                                          "hydra:member":
                                              type: array
                                              items:
                                                  $ref: "#/components/schemas/BuroDeCreditoReport"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
    /datasources/mx/buro-de-credito/reports/{id}:
        get:
            tags:
                - DS MX Buró de Crédito Reports
            operationId: GetEntityMxBuroDeCreditoReport
            summary: Get a Buró de Crédito report
            parameters:
                - $ref: "#/components/parameters/resourceId"
            responses:
                "200":
                    description: Buró de Crédito Report
                    content:
                        application/ld+json:
                            schema:
                                type: object
                                allOf:
                                    - type: object
                                      properties:
                                          "@context":
                                              default: /contexts/BuroDeCreditoReport
                                          "@id":
                                              example: /entities/9bd4a640-9f41-4cd5-a158-20767b386ca0/datasources/mx/buro-de-credito/reports/9bd4a640-9f41-4cd5-a158-20767b386cb0
                                    - $ref: "#/components/schemas/BuroDeCreditoReport"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
    /entities/{entityId}/datasources/mx/buro-de-credito/authorizations:
        get:
            tags:
                - DS MX Buró de Crédito Authorizations
            operationId: GetEntityMxBuroDeCreditoAuthorization
            summary: Get an entity's Buró de Crédito authorizations
            parameters:
                - $ref: "#/components/parameters/entityId"
            responses:
                "200":
                    description: Buró de Crédito Authorizations
                    content:
                        application/ld+json:
                            schema:
                                type: object
                                allOf:
                                    - $ref: "#/components/schemas/CursorCollection"
                                    - type: object
                                      properties:
                                          "@context":
                                              default: /contexts/BuroDeCreditoAuthorization
                                          "@id":
                                              example: /entities/9bd4a640-9f41-4cd5-a158-20767b386ca0/datasources/mx/buro-de-credito/authorizations
                                          "hydra:member":
                                              type: array
                                              items:
                                                  $ref: "#/components/schemas/BuroDeCreditoAuthorization"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
        post:
            tags:
                - DS MX Buró de Crédito Authorizations
            operationId: CreateMxBuroDeCreditoAuthorization
            summary: Create a Buró de Crédito authorization
            parameters:
                - $ref: "#/components/parameters/entityId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            oneOf:
                                - title: "Person"
                                  properties:
                                      authorizedAt:
                                          type: string
                                          format: date-time
                                          example: "2024-01-31T00:00:00+00:00"
                                      taxpayer:
                                          type: object
                                          required:
                                              - rfc
                                              - nationality
                                              - birthdate
                                              - firstName
                                              - firstLastName
                                              - secondLastName
                                              - address
                                          properties:
                                              rfc:
                                                  type: string
                                                  example: "PRPU800101HM2"
                                              nationality:
                                                  type: string
                                                  example: "MX"
                                              birthdate:
                                                  type: string
                                                  format: date
                                                  example: "1980-01-01"
                                              firstName:
                                                  type: string
                                                  example: "UNO"
                                              firstLastName:
                                                  type: string
                                                  example: "PRUEBA"
                                              secondLastName:
                                                  type: string
                                                  example: "PROSPECTOR"
                                              address:
                                                  type: object
                                                  required:
                                                      - address
                                                      - city
                                                      - municipality
                                                      - state
                                                      - postalCode
                                                      - neighborhood
                                                      - country
                                                  properties:
                                                      address:
                                                          type: string
                                                          example: "Jaime Balmes"
                                                      city:
                                                          type: string
                                                          example: "Cd de Mexico"
                                                      municipality:
                                                          type: string
                                                          example: "Miguel Hidalgo"
                                                      state:
                                                          type: string
                                                          example: "CMX"
                                                      postalCode:
                                                          type: string
                                                          example: "11510"
                                                      exteriorNumber:
                                                          type: string
                                                          example: "8"
                                                      interiorNumber:
                                                          type: string
                                                          example: ""
                                                      neighborhood:
                                                          type: string
                                                          example: "Los morales"
                                                      country:
                                                          type: string
                                                          example: "MX"
                                - title: Company
                                  properties:
                                      authorizedAt:
                                          type: string
                                          format: date-time
                                          example: "2024-01-31T00:00:00+00:00"
                                      taxpayer:
                                          type: object
                                          properties:
                                              rfc:
                                                  type: string
                                                  example: "AGS930324RN7"
                                              nationality:
