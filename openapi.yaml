            responses:
                "200":
                    description: SAT Certificates
                    content:
                        application/ld+json:
                            schema:
                                type: object
                                allOf:
                                    - $ref: "#/components/schemas/Collection"
                                    - type: object
                                      properties:
                                          "@context":
                                              default: /contexts/SatCertificate
                                          "@id":
                                              example: /entities/91ab5678-1234-5678-9abc-def012345678/datasources/mx/sat/certificados
                                          "hydra:member":
                                              type: array
                                              items:
                                                  $ref: "#/components/schemas/SatCertificate"
                                          "hydra:search":
                                              type: object
                                              properties:
                                                  "@type":
                                                      type: string
                                                      default: hydra:IriTemplate
                                                  "hydra:template":
                                                      example: "/entities/91ab5678-1234-5678-9abc-def012345678/datasources/mx/sat/certificados{?validFrom[before],validFrom[strictly_before],validFrom[after],validFrom[strictly_after],validTo[before],validTo[strictly_before],validTo[after],validTo[strictly_after],order[validFrom],order[validTo],serialNumber,type}"
                                                  hydra:variableRepresentation:
                                                      type: string
                                                      default: BasicRepresentation
                                                  hydra:mapping:
                                                      type: array
                                                      items:
                                                          type: object
                                                          properties:
                                                              "@type":
                                                                  type: string
                                                                  default: IriTemplateMapping
                                                              variable:
                                                                  type: string
                                                              property:
                                                                  type: string
                                                              required:
                                                                  type: boolean
                                                                  default: false
                                                      example:
                                                          - "@type": IriTemplateMapping
                                                            variable: "validFrom[before]"
                                                            property: validFrom
                                                            required: false
                                                          - "@type": IriTemplateMapping
                                                            variable: "validFrom[strictly_before]"
                                                            property: validFrom
                                                            required: false
                                                          - "@type": IriTemplateMapping
                                                            variable: "validFrom[after]"
                                                            property: validFrom
                                                            required: false
                                                          - "@type": IriTemplateMapping
                                                            variable: "validFrom[strictly_after]"
                                                            property: validFrom
                                                            required: false
                                                          - "@type": IriTemplateMapping
                                                            variable: "validTo[before]"
                                                            property: validTo
                                                            required: false
                                                          - "@type": IriTemplateMapping
                                                            variable: "validTo[strictly_before]"
                                                            property: validTo
                                                            required: false
                                                          - "@type": IriTemplateMapping
                                                            variable: "validTo[after]"
                                                            property: validTo
                                                            required: false
                                                          - "@type": IriTemplateMapping
                                                            variable: "validTo[strictly_after]"
                                                            property: validTo
                                                            required: false
                                                          - "@type": IriTemplateMapping
                                                            variable: "order[validFrom]"
                                                            property: validFrom
                                                            required: false
                                                          - "@type": IriTemplateMapping
                                                            variable: "order[validTo]"
                                                            property: validTo
                                                            required: false
                                                          - "@type": IriTemplateMapping
                                                            variable: serialNumber
                                                            property: serialNumber
                                                            required: false
                                                          - "@type": IriTemplateMapping
                                                            variable: type
                                                            property: type
                                                            required: false
                "401":
