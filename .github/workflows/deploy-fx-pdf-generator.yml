name: Deploy fx-pdf-generator

on:
  push:
    branches:
      - master
    paths:
      - 'fx-pdf-generator/**'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify secret exists
        env:
          PWD_CHECK: ${{ secrets.PDF_SERVER_PASSWORD }}
        run: |
          if [ -z "$PWD_CHECK" ]; then
            echo "::error::PDF_SERVER_PASSWORD secret is not set."
            exit 1
          fi
          echo "Secret is configured."

      - name: Package fx-pdf-generator
        run: tar -czf /tmp/fx-pdf-generator.tar.gz -C fx-pdf-generator .

      - name: Upload artifact to server
        env:
          SSHPASS: ${{ secrets.PDF_SERVER_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          sshpass -e scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            /tmp/fx-pdf-generator.tar.gz root@24.199.103.222:/root/fx-pdf-generator.tar.gz

      - name: Deploy app via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 24.199.103.222
          username: root
          password: ${{ secrets.PDF_SERVER_PASSWORD }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script_stop: true
          script: |
            set -e

            APP_DIR="/opt/fx-pdf-generator"

            echo "==> Ensuring Node.js is installed..."
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            echo "    Node $(node -v) / npm $(npm -v)"

            echo "==> Ensuring PM2 is installed..."
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
              pm2 startup systemd -u root --hp /root
            fi

            echo "==> Deploying new version..."
            mkdir -p "$APP_DIR"
            tar -xzf /root/fx-pdf-generator.tar.gz -C "$APP_DIR"
            rm -f /root/fx-pdf-generator.tar.gz
            cd "$APP_DIR"

            echo "==> Installing npm dependencies..."
            npm ci --omit=dev

            echo "==> Installing Chromium dependencies for Puppeteer..."
            apt-get update -qq

            # Try installing with standard names first, then t64 suffix for Ubuntu 24.04+
            apt-get install -y --no-install-recommends \
              ca-certificates fonts-liberation libappindicator3-1 \
              libasound2 libatk-bridge2.0-0 libatk1.0-0 libcairo2 \
              libcups2 libdbus-1-3 libdrm2 libexpat1 libgbm1 \
              libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 \
              libpangocairo-1.0-0 libx11-6 libx11-xcb1 libxcb1 \
              libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 \
              libxi6 libxrandr2 libxrender1 libxshmfence1 libxss1 \
              libxtst6 xdg-utils wget libglu1-mesa \
              2>&1 || apt-get install -y --no-install-recommends \
              ca-certificates fonts-liberation \
              libasound2t64 libatk-bridge2.0-0t64 libatk1.0-0t64 libcairo2 \
              libcups2t64 libdbus-1-3 libdrm2 libexpat1 libgbm1 \
              libglib2.0-0t64 libgtk-3-0t64 libnspr4 libnss3 libpango-1.0-0 \
              libpangocairo-1.0-0 libx11-6 libx11-xcb1 libxcb1 \
              libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 \
              libxi6 libxrandr2 libxrender1 libxshmfence1 libxss1 \
              libxtst6 xdg-utils wget libglu1-mesa 2>&1 || true

            # Verify the critical library exists
            echo "    Checking libatk-1.0.so.0..."
            find / -name "libatk-1.0.so*" 2>/dev/null || echo "    WARNING: libatk not found!"
            ldconfig 2>/dev/null || true

            # If libatk still missing, try to find and symlink it
            if ! ldconfig -p | grep -q "libatk-1.0.so.0"; then
              echo "    libatk-1.0.so.0 not in ldconfig, attempting fix..."
              apt-get install -y gir1.2-atk-1.0 libatk1.0-dev 2>&1 || true
              ldconfig
            fi

            echo "    Library check:"
            ldconfig -p | grep -i "libatk" || echo "    No libatk found in ldconfig!"

            echo "==> Setting up environment..."
            if [ ! -f "$APP_DIR/.env" ]; then
              printf 'PORT=3001\nNODE_ENV=production\nALLOWED_ORIGINS=https://capital.xendinglobal.com\n' > "$APP_DIR/.env"
              echo "    Created default .env"
            fi

            echo "==> Restarting application with PM2..."
            pm2 delete fx-pdf-generator 2>/dev/null || true
            pm2 start server.js \
              --name fx-pdf-generator \
              --cwd "$APP_DIR" \
              --max-memory-restart 512M \
              --env production
            pm2 save

            echo "==> App deployment complete!"
            pm2 list

      - name: Configure Nginx via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 24.199.103.222
          username: root
          password: ${{ secrets.PDF_SERVER_PASSWORD }}
          port: 22
          timeout: 60s
          command_timeout: 5m
          script_stop: false
          script: |
            echo "==> Running Nginx patch script..."
            bash /opt/fx-pdf-generator/scripts/patch-nginx.sh 2>&1
            echo "==> Done"
