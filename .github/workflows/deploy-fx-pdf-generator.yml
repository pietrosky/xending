name: Deploy fx-pdf-generator

on:
  push:
    branches:
      - master
    paths:
      - 'fx-pdf-generator/**'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify secret exists
        env:
          PWD_CHECK: ${{ secrets.PDF_SERVER_PASSWORD }}
        run: |
          if [ -z "$PWD_CHECK" ]; then
            echo "::error::PDF_SERVER_PASSWORD secret is not set."
            exit 1
          fi
          echo "Secret is configured."

      - name: Package fx-pdf-generator
        run: tar -czf /tmp/fx-pdf-generator.tar.gz -C fx-pdf-generator .

      - name: Upload artifact to server
        env:
          SSHPASS: ${{ secrets.PDF_SERVER_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          sshpass -e scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            /tmp/fx-pdf-generator.tar.gz root@24.199.103.222:/root/fx-pdf-generator.tar.gz

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 24.199.103.222
          username: root
          password: ${{ secrets.PDF_SERVER_PASSWORD }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script_stop: true
          script: |
            set -e

            APP_DIR="/opt/fx-pdf-generator"

            # --- Node.js 20 ---
            echo "==> Ensuring Node.js is installed..."
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            echo "    Node $(node -v) / npm $(npm -v)"

            # --- PM2 process manager ---
            echo "==> Ensuring PM2 is installed..."
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
              pm2 startup systemd -u root --hp /root
            fi

            # --- Deploy artifact ---
            echo "==> Deploying new version..."
            mkdir -p "$APP_DIR"
            tar -xzf /root/fx-pdf-generator.tar.gz -C "$APP_DIR"
            rm -f /root/fx-pdf-generator.tar.gz
            cd "$APP_DIR"

            # --- Install production dependencies ---
            echo "==> Installing npm dependencies..."
            npm ci --omit=dev

            # --- Puppeteer / Chromium system libs ---
            echo "==> Installing Chromium dependencies for Puppeteer..."
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends \
              ca-certificates fonts-liberation libasound2 libatk-bridge2.0-0 \
              libatk1.0-0 libcups2 libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 \
              libnspr4 libnss3 libx11-xcb1 libxcomposite1 libxdamage1 \
              libxrandr2 xdg-utils libxshmfence1 libglu1-mesa \
              > /dev/null 2>&1 || true

            # --- Environment file ---
            echo "==> Setting up environment..."
            if [ ! -f "$APP_DIR/.env" ]; then
              printf 'PORT=3001\nNODE_ENV=production\n' > "$APP_DIR/.env"
              echo "    Created default .env — edit on server if you need extra vars"
            fi

            # --- Nginx reverse proxy + SSL (first deploy only) ---
            echo "==> Configuring Nginx..."
            NGINX_CONF="/etc/nginx/sites-available/fx-pdf-generator"
            if [ ! -f "$NGINX_CONF" ]; then

              # Step 1: HTTP-only config so certbot can verify the domain
              printf '%s\n' \
                'server {' \
                '    listen 80;' \
                '    server_name pdf.xending.com;' \
                '' \
                '    location / {' \
                '        proxy_pass http://127.0.0.1:3001;' \
                '    }' \
                '}' > "$NGINX_CONF"

              ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/fx-pdf-generator
              nginx -t && systemctl reload nginx

              # Step 2: Issue SSL cert if it doesn't exist yet
              if [ ! -f /etc/letsencrypt/live/pdf.xending.com/fullchain.pem ]; then
                echo "    Issuing Let's Encrypt certificate..."
                apt-get install -y -qq certbot python3-certbot-nginx > /dev/null 2>&1 || true
                certbot --nginx -d pdf.xending.com --non-interactive --agree-tos --redirect \
                  --email admin@xending.com \
                  --cert-name pdf.xending.com
                echo "    SSL certificate issued and Nginx updated by certbot"
              else
                echo "    SSL cert already exists, applying full config..."
                printf '%s\n' \
                  'server {' \
                  '    listen 80;' \
                  '    server_name pdf.xending.com;' \
                  '    return 301 https://$host$request_uri;' \
                  '}' \
                  '' \
                  'server {' \
                  '    listen 443 ssl;' \
                  '    server_name pdf.xending.com;' \
                  '' \
                  '    ssl_certificate /etc/letsencrypt/live/pdf.xending.com/fullchain.pem;' \
                  '    ssl_certificate_key /etc/letsencrypt/live/pdf.xending.com/privkey.pem;' \
                  '    include /etc/letsencrypt/options-ssl-nginx.conf;' \
                  '    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;' \
                  '' \
                  '    client_max_body_size 20M;' \
                  '' \
                  '    location / {' \
                  '        proxy_pass http://127.0.0.1:3001;' \
                  '        proxy_http_version 1.1;' \
                  '        proxy_set_header Upgrade $http_upgrade;' \
                  '        proxy_set_header Connection '\''upgrade'\'';' \
                  '        proxy_set_header Host $host;' \
                  '        proxy_set_header X-Real-IP $remote_addr;' \
                  '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' \
                  '        proxy_set_header X-Forwarded-Proto $scheme;' \
                  '        proxy_cache_bypass $http_upgrade;' \
                  '        proxy_read_timeout 120s;' \
                  '        proxy_send_timeout 120s;' \
                  '    }' \
                  '}' > "$NGINX_CONF"
                nginx -t && systemctl reload nginx
              fi

              echo "    Nginx configured for pdf.xending.com"
            else
              echo "    Nginx config already exists, skipping"
            fi

            # --- Restart with PM2 ---
            echo "==> Restarting application with PM2..."
            pm2 delete fx-pdf-generator 2>/dev/null || true
            pm2 start server.js \
              --name fx-pdf-generator \
              --cwd "$APP_DIR" \
              --max-memory-restart 512M \
              --env production
            pm2 save

            echo "==> Deployment complete!"
            pm2 list
